services:
  postgres:
    image: postgres:16-alpine
    container_name: character-management-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ayezan@987##
      POSTGRES_DB: character_management_db
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

